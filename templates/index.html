<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eActivity Generator (.g2e)</title>
  <link rel="icon" href="{{ url_for('static', filename='icon.ico') }}" sizes="any">
  <link rel="shortcut icon" href="{{ url_for('static', filename='icon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>

  <img class="site-icon" src="{{ url_for('static', filename='icon.ico') }}" alt="">
  <h1>eActivity Generator (.g2e)</h1>
  <p class="subtitle">Casio fx-9750GIII / fx-9860G — fx-9860GII</p>
  <p class="credit">Made by <a href="https://frack.one" target="_blank" rel="noopener noreferrer">frack.one</a></p>
  {% if desktop_download_url %}
  <p class="desktop-download"><a href="{{ desktop_download_url }}">Descargar versión de escritorio</a></p>
  {% endif %}

  <div class="card">
    <form id="g2eForm" method="POST" action="{{ generate_url }}">

      <label for="filename">Nombre del archivo</label>
      <input type="text" id="filename" name="filename"
             placeholder="EACT" value="EACT" maxlength="8">

      <label for="content">Contenido</label>
      <textarea id="content" name="content" spellcheck="false"></textarea>

      <div class="actions">
        <button type="button" class="secondary-btn" id="importBtn">↥ Importar .g2e</button>
        <button type="submit" class="primary-btn">⬇ Descargar .g2e</button>
      </div>
      <input type="file" id="importFile" accept=".g2e,application/octet-stream" hidden>
      <div class="import-status" id="importStatus" aria-live="polite"></div>
    </form>

    <div class="screen-section">
      <div class="screen-section-header">
        <h3>Simulación de pantalla — fx-9750GIII</h3>
        <span class="screen-page-info" id="pageInfo"></span>
      </div>

      <div class="screen-layout">
        <div class="screen-bezel">
          <div class="screen-inner">
            <canvas id="screen"></canvas>
          </div>
        </div>

        <div class="screen-controls">
          <button type="button" class="nav-btn" id="prevPage" disabled>▲ Arriba</button>
          <button type="button" class="nav-btn" id="nextPage" disabled>▼ Abajo</button>
          <div class="screen-stats" id="screenStats"></div>
        </div>
      </div>
    </div>

    <div class="encoding-ref">
      <h3>Insertar símbolo o plantilla</h3>

      <div class="math-templates">
        <button type="button" class="math-btn" id="btnFrac" title="Fracción: \frac{num}{den}">
          <span class="math-preview">
            <span>a</span><span class="frac-bar"></span><span>b</span>
          </span>
          Fracción
        </button>
        <button type="button" class="math-btn" id="btnPow" title="Potencia: a^{n}">
          <span>a<sup style="font-size:0.6em">n</sup></span>
          Potencia
        </button>
        <button type="button" class="math-btn" id="btnSqrt" title="Raíz cuadrada: \sqrt{x}">
          <span>√x</span>
          Raíz ²
        </button>
        <button type="button" class="math-btn" id="btnNroot" title="Raíz n-ésima: \sqrt[n]{x}">
          <span><sup style="font-size:0.6em">n</sup>√x</span>
          Raíz ⁿ
        </button>
        <button type="button" class="math-btn" id="btnInt" title="Integral: \int">
          <span style="font-size:1.1rem">∫</span>
          Integral
        </button>
        <button type="button" class="math-btn" id="btnAbs" title="Valor absoluto: \abs{x}">
          <span>|x|</span>
          V.Abs
        </button>
      </div>

      <div class="sym-tabs" id="symTabs"></div>
    </div>
  </div>

  <script>
    window.APP_CONFIG = {
      importUrl: {{ import_url|tojson }}
    };
  </script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
